privatebin:
  fullnameOverride: privatebin

  configs:
    conf.php: |
      [main]
      name = "Blyatflix Paste"
      discussion = true
      opendiscussion = false
      password = true
      fileupload = false
      burnafterreadingselected = false
      defaultformatter = "plaintext"
      syntaxhighlightingtheme = "sons-of-obsidian"
      sizelimit = 10485760
      template = "bootstrap"
      expire = "1month"

      [model]
      class = Filesystem

      [model_options]
      dir = /srv/data

  image:
    pullPolicy: IfNotPresent

  controller:
    kind: StatefulSet
    pvc:
      accessModes: ReadWriteOnce
      requests: 5Gi
      storageClass: longhorn

  service:
    type: ClusterIP
    port: 8080

  ingress:
    enabled: false

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
